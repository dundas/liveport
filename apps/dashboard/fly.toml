# Fly.io configuration for LivePort Dashboard
# Deploy: fly deploy --config apps/dashboard/fly.toml

app = "liveport-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Static asset caching
[[statics]]
  guest_path = "/app/.next/static"
  url_prefix = "/_next/static"

[processes]
  app = "node server.js"
