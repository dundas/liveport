# Fly.io configuration for LivePort Tunnel Server
# Deploy: fly deploy --config apps/tunnel-server/fly.toml

app = "liveport-tunnel"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  BASE_DOMAIN = "liveport.dev"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Health check
[[services.http_checks]]
  interval = "10s"
  timeout = "2s"
  grace_period = "5s"
  method = "get"
  path = "/health"

# WebSocket support
[[services.ports]]
  handlers = ["http", "tls"]
  port = 443
  tls_options = { "alpn" = ["h2", "http/1.1"] }

[[services.ports]]
  handlers = ["http"]
  port = 80

# Persistent connections for WebSocket
[processes]
  app = "node dist/index.mjs"
