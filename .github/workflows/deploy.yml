# LivePort Deployment Workflow
# Deploys tunnel server to Fly.io on push to main
# Dashboard is deployed via Vercel (automatic on push)

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Dummy build-time values — Next.js evaluates modules during build
          # but these are never used at runtime (Vercel uses real secrets)
          AUTH_SECRET: "build-time-placeholder-32-chars-min"
          MECH_APPS_APP_ID: "00000000-0000-0000-0000-000000000000"
          MECH_APPS_API_KEY: "00000000-0000-0000-0000-000000000000"
          NEXT_PUBLIC_APP_URL: "https://liveport.dev"

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  deploy-tunnel:
    name: Deploy Tunnel Server
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Tunnel Server
        run: flyctl deploy --config apps/tunnel-server/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Dashboard deployment removed - now handled by Vercel automatically
  # Vercel will deploy on push to main via GitHub integration
