openapi: 3.1.0
info:
  title: LivePort API
  description: |
    API for managing LivePort tunnels and bridge keys.

    ## Authentication

    LivePort uses two authentication methods:

    ### Session Authentication (Dashboard)
    Used for the web dashboard. Sessions are managed via cookies after login.

    ### Bridge Key Authentication (Agent API)
    Used by AI agents and CLI tools. Pass your bridge key in the `Authorization` header:
    ```
    Authorization: Bearer bk_xxxxxxxxxxxxxxxxxxxx
    ```
  version: 0.1.0
  contact:
    name: LivePort Support
    url: https://liveport.dev
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://app.liveport.dev
    description: Production server
  - url: http://localhost:3001
    description: Local development

x-internal-architecture:
  description: |
    LivePort uses a dual-server architecture to handle WebSocket and HTTP traffic separately:

    **Port 8080 (WebSocket Server)**:
    - Handles WebSocket upgrade requests directly
    - Proxies regular HTTP requests internally to port 8081
    - Single entry point for production deployments (Fly.io, Cloudflare)

    **Port 8081 (HTTP Server)**:
    - Runs Hono framework for API endpoints
    - Never sees WebSocket upgrade requests
    - Zero middleware interference with WebSocket connections

    This architecture prevents "RSV1 must be clear" errors caused by HTTP middleware
    writing responses to WebSocket connections. All external traffic goes through port 8080.

tags:
  - name: Bridge Keys
    description: Manage bridge keys for tunnel authentication
  - name: Tunnels
    description: View and manage active tunnels
  - name: WebSocket
    description: |
      WebSocket tunneling support for real-time bidirectional communication.

      **Architecture**: LivePort uses a dual-server design that automatically routes WebSocket
      and HTTP traffic appropriately. This is completely transparent to users - simply connect
      to your tunnel URL with either HTTP(S) or WebSocket (WS/WSS) protocols.

      See [WebSocket Guide](../WEBSOCKET_GUIDE.md) for detailed documentation.
  - name: Agent API
    description: API endpoints for AI agents and automation
  - name: Health
    description: Service health and status

paths:
  /api/keys:
    get:
      summary: List bridge keys
      description: Returns all bridge keys for the authenticated user
      operationId: listKeys
      tags: [Bridge Keys]
      security:
        - sessionAuth: []
      responses:
        '200':
          description: List of bridge keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/BridgeKey'
              example:
                keys:
                  - id: "key_abc123"
                    name: "Production Key"
                    prefix: "bk_abc1"
                    status: "active"
                    expiresAt: "2025-12-31T23:59:59Z"
                    maxUses: 1000
                    currentUses: 42
                    allowedPort: null
                    lastUsedAt: "2025-11-27T10:30:00Z"
                    createdAt: "2025-11-01T00:00:00Z"
                    updatedAt: "2025-11-27T10:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Create bridge key
      description: |
        Creates a new bridge key. The full key is returned only once in the response.
        Store it securely as it cannot be retrieved again.
      operationId: createKey
      tags: [Bridge Keys]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyRequest'
            example:
              name: "CI/CD Key"
              expiresInDays: 30
              maxUses: 100
      responses:
        '200':
          description: Bridge key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateKeyResponse'
              example:
                key: "bk_abc123def456ghi789jkl012mno345"
                id: "key_xyz789"
                name: "CI/CD Key"
                prefix: "bk_abc1"
                expiresAt: "2025-12-27T13:45:00Z"
                maxUses: 100
                allowedPort: null
                createdAt: "2025-11-27T13:45:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/keys/{id}:
    delete:
      summary: Revoke bridge key
      description: Revokes a bridge key, preventing further use
      operationId: revokeKey
      tags: [Bridge Keys]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Bridge key ID
          schema:
            type: string
          example: "key_abc123"
      responses:
        '200':
          description: Key revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum: [revoked]
                  message:
                    type: string
              example:
                id: "key_abc123"
                status: "revoked"
                message: "Key revoked successfully"
        '400':
          description: Key ID required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Key belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/tunnels:
    get:
      summary: List user tunnels
      description: Returns all tunnels for the authenticated user
      operationId: listTunnels
      tags: [Tunnels]
      security:
        - sessionAuth: []
      responses:
        '200':
          description: List of tunnels
          content:
            application/json:
              schema:
                type: object
                properties:
                  tunnels:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tunnel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/agent/tunnels:
    get:
      summary: List tunnels for bridge key
      description: Returns active tunnels associated with the authenticated bridge key
      operationId: listAgentTunnels
      tags: [Agent API]
      security:
        - bridgeKeyAuth: []
      responses:
        '200':
          description: List of active tunnels
          content:
            application/json:
              schema:
                type: object
                properties:
                  tunnels:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentTunnel'
              example:
                tunnels:
                  - tunnelId: "tun_abc123"
                    subdomain: "my-app-xyz"
                    url: "https://my-app-xyz.liveport.online"
                    localPort: 3000
                    state: "active"
                    createdAt: "2025-11-27T10:00:00Z"
        '401':
          description: Invalid or missing bridge key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
              example:
                error: "Invalid bridge key"
                code: "INVALID_KEY"
        '502':
          description: Tunnel server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'

  /api/agent/tunnels/wait:
    get:
      summary: Wait for tunnel
      description: |
        Long-polls until a tunnel becomes available or timeout is reached.
        Use this to wait for a developer to start their local tunnel.
      operationId: waitForTunnel
      tags: [Agent API]
      security:
        - bridgeKeyAuth: []
      parameters:
        - name: timeout
          in: query
          description: Maximum time to wait in milliseconds (1000-30000)
          schema:
            type: integer
            minimum: 1000
            maximum: 30000
            default: 5000
          example: 30000
      responses:
        '200':
          description: Tunnel is available
          content:
            application/json:
              schema:
                type: object
                properties:
                  tunnel:
                    $ref: '#/components/schemas/AgentTunnel'
              example:
                tunnel:
                  tunnelId: "tun_abc123"
                  subdomain: "my-app-xyz"
                  url: "https://my-app-xyz.tunnel.liveport.dev"
                  localPort: 3000
                  state: "active"
                  createdAt: "2025-11-27T10:00:00Z"
        '401':
          description: Invalid or missing bridge key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '408':
          description: Timeout - no tunnel available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
              example:
                error: "No tunnel available"
                code: "TIMEOUT"
        '502':
          description: Tunnel server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'

  /ws:
    get:
      summary: WebSocket tunnel connection
      description: |
        Establishes a WebSocket connection through your LivePort tunnel.

        ## How to Connect

        Connect to your tunnel URL with the WebSocket protocol:

        ```javascript
        // Replace with your tunnel URL
        const ws = new WebSocket('wss://abc123.liveport.dev/your-path');
        ```

        ## Architecture

        LivePort uses a **dual-server architecture** for maximum reliability:
        - All traffic enters through port 8080 (production)
        - WebSocket upgrades are handled directly without middleware interference
        - Regular HTTP requests are internally proxied to port 8081 (Hono)
        - This prevents "RSV1 must be clear" errors from HTTP middleware

        **For users**: This is completely transparent. Simply use `https://` or `wss://` URLs as normal.

        ## Features

        - **Automatic Proxying**: WebSocket upgrade requests are automatically detected and proxied to your local server
        - **Bidirectional Frames**: Full support for text, binary, ping, pong, and close frames
        - **Raw Byte Piping**: Zero protocol interference - frames are relayed byte-for-byte
        - **Resource Limits**:
          - Maximum 100 concurrent WebSocket connections per tunnel
          - Maximum 10MB frame size
        - **Subprotocol Support**: WebSocket subprotocols are forwarded to your local server

        ## Frame Types Supported

        - Text frames (opcode 1)
        - Binary frames (opcode 2)
        - Ping frames (opcode 9)
        - Pong frames (opcode 10)
        - Close frames (opcode 8)

        ## Error Codes

        - `429 Too Many Requests`: Exceeded 100 concurrent connections limit
        - `1009 Message Too Big`: Frame size exceeded 10MB limit
        - `502 Bad Gateway`: Unable to connect to local WebSocket server

        ## Full Documentation

        For complete WebSocket documentation including examples and best practices, see:
        - [WebSocket Guide](../WEBSOCKET_GUIDE.md)
        - [Architecture Docs](../architecture/websocket-protocol.md)

      operationId: websocketTunnel
      tags: [WebSocket]
      parameters:
        - name: Upgrade
          in: header
          required: true
          description: Must be "websocket"
          schema:
            type: string
            enum: [websocket]
        - name: Connection
          in: header
          required: true
          description: Must be "Upgrade"
          schema:
            type: string
            enum: [Upgrade]
        - name: Sec-WebSocket-Key
          in: header
          required: true
          description: WebSocket handshake key
          schema:
            type: string
        - name: Sec-WebSocket-Version
          in: header
          required: true
          description: WebSocket protocol version (typically 13)
          schema:
            type: string
            enum: ["13"]
        - name: Sec-WebSocket-Protocol
          in: header
          required: false
          description: Requested subprotocol(s)
          schema:
            type: string
      responses:
        '101':
          description: |
            Switching Protocols - WebSocket connection established.
            The connection is now a bidirectional WebSocket stream.
          headers:
            Upgrade:
              schema:
                type: string
                enum: [websocket]
            Connection:
              schema:
                type: string
                enum: [Upgrade]
            Sec-WebSocket-Accept:
              schema:
                type: string
              description: WebSocket handshake acceptance key
            Sec-WebSocket-Protocol:
              schema:
                type: string
              description: Selected subprotocol (if any)
        '400':
          description: Bad Request - Invalid WebSocket upgrade headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too Many Requests - Exceeded 100 concurrent connections per tunnel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Too many WebSocket connections (max 100 per tunnel)"
        '502':
          description: Bad Gateway - Unable to connect to local WebSocket server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unable to connect to local server"

  /api/health:
    get:
      summary: Health check
      description: Returns service health status and dependency checks
      operationId: healthCheck
      tags: [Health]
      parameters:
        - name: detailed
          in: query
          description: Include detailed dependency status
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "healthy"
                timestamp: "2025-11-27T13:45:00Z"
                version: "0.1.0"
                checks:
                  database: "ok"
                  redis: "ok"
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "unhealthy"
                timestamp: "2025-11-27T13:45:00Z"
                version: "0.1.0"
                checks:
                  database: "ok"
                  redis: "error"

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Session cookie from dashboard login

    bridgeKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: BridgeKey
      description: |
        Bridge key authentication for agent API.
        Format: `Bearer bk_xxxxxxxxxxxxxxxxxxxx`

  schemas:
    BridgeKey:
      type: object
      properties:
        id:
          type: string
          description: Unique key identifier
        name:
          type: string
          description: User-defined key name
        prefix:
          type: string
          description: First 8 characters of the key (for identification)
        status:
          type: string
          enum: [active, revoked, expired]
        expiresAt:
          type: string
          format: date-time
          nullable: true
        maxUses:
          type: integer
          nullable: true
          description: Maximum allowed uses (null = unlimited)
        currentUses:
          type: integer
          description: Current usage count
        allowedPort:
          type: integer
          nullable: true
          description: Restrict to specific port (null = any port)
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateKeyRequest:
      type: object
      properties:
        name:
          type: string
          default: "API Key"
          description: Name for the key
        expiresInDays:
          type: integer
          minimum: 1
          description: Days until key expires (omit for non-expiring)
        maxUses:
          type: integer
          minimum: 1
          description: Maximum uses (omit for unlimited)
        allowedPort:
          type: integer
          minimum: 1
          maximum: 65535
          description: Restrict to specific port

    CreateKeyResponse:
      type: object
      required: [key, id, name, prefix, createdAt]
      properties:
        key:
          type: string
          description: |
            The full bridge key. **Store securely - shown only once!**
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        maxUses:
          type: integer
          nullable: true
        allowedPort:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    Tunnel:
      type: object
      properties:
        id:
          type: string
        subdomain:
          type: string
        publicUrl:
          type: string
          format: uri
        localPort:
          type: integer
        region:
          type: string
        connectedAt:
          type: string
          format: date-time
        requestCount:
          type: integer
        bytesTransferred:
          type: integer
        websocketConnectionCount:
          type: integer
          description: Number of active WebSocket connections
          example: 5

    AgentTunnel:
      type: object
      properties:
        tunnelId:
          type: string
        subdomain:
          type: string
        url:
          type: string
          format: uri
        localPort:
          type: integer
        state:
          type: string
          enum: [active, disconnected]
        createdAt:
          type: string
          format: date-time

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, error, unknown]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AgentError:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
          enum:
            - INVALID_KEY
            - EXPIRED_KEY
            - REVOKED_KEY
            - USAGE_LIMIT_EXCEEDED
            - TIMEOUT
            - TUNNEL_SERVER_ERROR
            - INTERNAL_ERROR

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Internal server error"
